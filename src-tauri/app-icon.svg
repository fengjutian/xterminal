<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a6e3a1"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="180" fill="#080808"/>

  <!-- X formed by two crossing lightning bolts -->
  <g fill="url(#g)" filter="url(#glow)">
    <!-- Top-left to bottom-right: lightning bolt -->
    <path d="M140 140 L380 280 L320 320 L550 470 L490 520 L700 700 L630 800 L884 884 L824 760 L600 560 L660 510 L430 360 L490 320 L340 200 Z"/>
    <!-- Top-right to bottom-left: lightning bolt -->
    <path d="M884 140 L644 280 L704 320 L474 470 L534 520 L324 700 L394 800 L140 884 L200 760 L424 560 L364 510 L594 360 L534 320 L684 200 Z"/>
  </g>
</svg>
